name: SIAOL-PRO v8.5-TURBO Cloud Multi-Brain ML Engine

on:
  schedule:
    # 15:00 UTC = 12:00 BRT (Meio-dia de Brasilia)
    - cron: '0 15 * * *'
  workflow_dispatch: # Botao de Run Manual no Github Actions

jobs:
  run-ml-engine:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout do Repositorio
      uses: actions/checkout@v4
      
    - name: Setup Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Instalar Dependencias (Motor + IAs)
      run: |
        python -m pip install --upgrade pip
        pip install requests python-dotenv groq google-generativeai
        
    - name: Acionar Motor Multi-Cerebro SIAOL-PRO v8.5-TURBO
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      run: |
        python main.py

