name: SIAOL-PRO Cloud ML Engine

on:
  schedule:
    # 15:00 UTC = 12:00 BRT (Meio-dia de Brasilia) rigorosamente!
    - cron: '0 15 * * *'
  workflow_dispatch: # Habilita um botão de Run Manual na tela do Github Actions!

jobs:
  run-ml-engine:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout do Repositorio Original
      uses: actions/checkout@v4
      
    - name: Subindo Maquina Virtual (Python 3.10)
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Instalar o Cerebro SIAOL e Modulos
      run: |
        python -m pip install --upgrade pip
        pip install requests python-dotenv
        
    - name: Acionar Gatilho Autonomo da Loteria
      env:
        # Peca chaves criptografadas do Github (Repository Secrets que meu subagent instalou)
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        python main.py
